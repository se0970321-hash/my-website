<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>갯고둥 염도 실험</title>

<style>

/* ✅ 폰트 불러오기 */
@font-face {
    font-family: 'customFont';
    src: url('./font.ttf') format('truetype');
}

/* 전체 폰트 통일 */
body {
    margin: 0;
    font-family: 'customFont', sans-serif;
    background: linear-gradient(#bcd7f0, #e8f3fb);
    text-align: center;
}

/* 상단 */
.header {
    display: inline-block;
    background: #f4e7c5;
    padding: 20px 40px;
    margin-top: 30px;
    border-radius: 50px;
    font-size: 32px;
    box-shadow: 0 5px 0 #d8c79a;
}

/* 메인 카드 */
.container {
    background: #fffaf0;
    border-radius: 25px;
    width: 80%;
    margin: 30px auto;
    padding: 30px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* 설명 */
.desc {
    background: #f8edd3;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
    text-align: left;
    font-size: 20px;
}

/* 버튼 */
.buttons button {
    font-family: 'customFont', sans-serif; /* ✅ 버튼도 동일 폰트 */
    margin: 10px;
    padding: 15px 30px;
    border: none;
    border-radius: 25px;
    font-size: 22px;
    cursor: pointer;
}

/* 염도 색 */
.btn-3 { background: #6bb6ff; color: white; }
.btn-13 { background: #a8e6a3; }
.btn-33 { background: #4caf50; color: white; }

/* 영상 */
video {
    width: 100%;
    max-width: 800px;
    margin-top: 20px;
    border-radius: 15px;
}

/* 표 */
table {
    margin: 30px auto;
    border-collapse: collapse;
    background: #f8edd3;
    border-radius: 15px;
    overflow: hidden;
    font-size: 20px;
}

th, td {
    font-family: 'customFont', sans-serif; /* ✅ 표도 통일 */
    padding: 15px 25px;
    border-bottom: 1px solid #ddd;
}

th {
    background: #f0d9a7;
}

/* 결과 */
.result {
    margin-top: 20px;
    font-size: 24px;
}

</style>
</head>

<body>

<div class="header">
🐚 갯고둥은 염도에 따라 어떻게 반응할까?
</div>

<div class="container">

<div class="desc">
갯고둥은 환경의 염도가 변하면 행동이 달라집니다.  
각 염도를 선택하여 갯고둥의 반응을 관찰해봅시다.
</div>

<div class="buttons">
    <button class="btn-3" onclick="changeData(3)">3 PSU</button>
    <button class="btn-13" onclick="changeData(13)">13 PSU</button>
    <button class="btn-33" onclick="changeData(33)">33 PSU</button>
</div>

<video id="video" controls>
    <source src="video3.mp4" type="video/mp4">
</video>

<table>
    <tr>
        <th>움직인 시간</th>
        <th>멈춰있는 시간</th>
        <th>처음 움직인 시점</th>
    </tr>
    <tr>
        <td id="move"></td>
        <td id="stop"></td>
        <td id="start"></td>
    </tr>
</table>

<div class="result" id="resultText"></div>

</div>

<script>
const data = {
    3: {
        video: "video3.mp4",
        move: "10분",
        stop: "23시간 50분",
        start: "거의 없음",
        result: "👉 극저염 상태"
    },
    13: {
        video: "video13.mp4",
        move: "1시간",
        stop: "23시간",
        start: "10분 후",
        result: "👉 저염 스트레스"
    },
    33: {
        video: "video33.mp4",
        move: "3시간 17분",
        stop: "20시간 43분",
        start: "0시간 4초",
        result: "👉 가장 활발"
    }
};

function changeData(s) {
    document.getElementById("video").src = data[s].video;
    document.getElementById("move").innerText = data[s].move;
    document.getElementById("stop").innerText = data[s].stop;
    document.getElementById("start").innerText = data[s].start;
    document.getElementById("resultText").innerText = data[s].result;
}

changeData(3);
</script>

</body>
</html>
